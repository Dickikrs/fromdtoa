<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerLink Pro - Clean Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; overflow: hidden; background: #05070a; color: white; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .glass-card { backdrop-filter: blur(40px); z-index: 10; border: 1px solid rgba(255,255,255,0.1); background: rgba(10, 15, 25, 0.95); }
        #sync-status { position: fixed; top: 15px; right: 15px; z-index: 200; font-size: 8px; font-weight: 900; color: #00d2ff; }
        .receipt-show { display: flex !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex justify-center items-center p-6 text-white">

    <div id="sync-status">OFFLINE</div>
    <canvas id="lightning"></canvas>

    <div id="receipt-overlay" class="hidden fixed inset-0 z-[200] bg-black/90 flex items-center justify-center p-6">
        <div class="bg-white text-black p-8 rounded-[35px] w-full max-w-xs shadow-2xl text-center">
            <h2 class="font-black text-xl mb-4 border-b border-dashed border-gray-300 pb-2 uppercase">Struk PowerLink</h2>
            <div class="space-y-3 text-left text-sm mb-6">
                <div class="flex justify-between"><span>ID Meteran:</span><span id="r-id" class="font-bold"></span></div>
                <div class="flex justify-between"><span>Isi Token:</span><span id="r-amount" class="font-black text-green-600 text-lg"></span></div>
                <div class="flex justify-between"><span>Tanggal:</span><span id="r-date" class="font-bold"></span></div>
                <div class="flex justify-between"><span>Status:</span><span class="font-bold text-blue-600">BERHASIL</span></div>
            </div>
            <button onclick="closeReceipt()" class="w-full bg-black text-white py-4 rounded-2xl font-bold active:scale-95">TUTUP STRUK</button>
        </div>
    </div>

    <div class="glass-card w-full max-w-sm p-7 rounded-[45px] shadow-2xl relative flex flex-col overflow-hidden">
        
        <div id="login-view" class="text-center py-4">
            <h1 class="text-2xl font-black tracking-[6px] mb-10 uppercase text-blue-400">PowerLink</h1>
            <div class="space-y-4">
                <button onclick="enterDashboard('542102176983')" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-left flex justify-between items-center active:scale-95">
                    <div><p class="text-[9px] text-gray-500 font-bold mb-1">METERAN 1</p><p class="text-lg font-black">542102176983</p></div>
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg>
                </button>
                <button onclick="enterDashboard('542100032687')" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-left flex justify-between items-center active:scale-95">
                    <div><p class="text-[9px] text-gray-400 font-bold mb-1">METERAN 2</p><p class="text-lg font-black">542100032687</p></div>
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
        </div>

        <div id="dashboard-view" class="hidden flex-1 flex flex-col overflow-hidden">
            <header class="flex justify-between items-center mb-6">
                <div class="text-[10px] bg-blue-500/20 px-3 py-1 rounded-full font-bold text-blue-400" id="idShow"></div>
                <button onclick="location.reload()" class="text-[9px] text-gray-500 font-bold">LOGOUT</button>
            </header>

            <div class="overflow-y-auto pr-1 flex-1 space-y-6">
                <div class="bg-blue-500/10 rounded-[32px] p-6 border border-blue-500/20 text-center relative">
                    <p class="text-[9px] font-bold tracking-[2px] mb-1 opacity-50 uppercase">Sisa Token (kWh)</p>
                    <div class="text-5xl font-black italic"><span id="balanceVal">0.0</span></div>
                </div>

                <div class="flex gap-2 bg-white/5 p-3 rounded-3xl border border-white/5">
                    <input type="number" id="mainInput" placeholder="kWh..." class="flex-1 bg-white/10 p-4 rounded-2xl text-sm outline-none font-bold">
                    <div class="flex flex-col gap-2">
                        <button onclick="op('-')" class="bg-red-500 p-3 rounded-xl active:scale-90">-</button>
                        <button onclick="op('+')" class="bg-green-500 p-3 rounded-xl active:scale-90">+</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <button onclick="resetToken()" class="bg-white/5 border border-white/10 py-3 rounded-xl text-[10px] font-bold opacity-60 hover:opacity-100 transition active:bg-red-500/20">RESET TOKEN</button>
                    <button onclick="resetHistory()" class="bg-white/5 border border-white/10 py-3 rounded-xl text-[10px] font-bold opacity-60 hover:opacity-100 transition active:bg-red-500/20">RESET HISTORI</button>
                </div>

                <div id="historyLog" class="space-y-3 pb-4"></div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbwcEAOCyHiuQuwcLJ-k4m-_xs7TstQQR3SEmCKbNUCmtrva-lUzQQ2XhBXEQoqBmEtT/exec";
        let balance = 0, meterID = "";

        async function enterDashboard(id) {
            meterID = id;
            document.getElementById('idShow').innerText = id;
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            loadFromCloud();
        }

        async function op(type) {
            const val = parseFloat(document.getElementById('mainInput').value);
            if(!val) return;

            if(type === '+') {
                balance += val;
                showReceipt(val);
                addHistory("Isi Token", val, "success");
            } else {
                balance -= val;
                addHistory("Pakai Harian", val, "danger");
            }
            
            updateUI();
            saveToCloud();
        }

        function showReceipt(val) {
            document.getElementById('r-id').innerText = meterID;
            document.getElementById('r-amount').innerText = "+" + val + " kWh";
            document.getElementById('r-date').innerText = new Date().toLocaleString('id-ID');
            document.getElementById('receipt-overlay').classList.add('receipt-show');
        }

        function closeReceipt() {
            document.getElementById('receipt-overlay').classList.remove('receipt-show');
        }

        function resetToken() {
            if(confirm("Reset saldo token menjadi 0?")) {
                balance = 0;
                addHistory("Reset Saldo", 0, "danger");
                updateUI();
                saveToCloud();
            }
        }

        function resetHistory() {
            if(confirm("Hapus semua histori transaksi?")) {
                document.getElementById('historyLog').innerHTML = "";
                saveToCloud();
            }
        }

        function addHistory(label, val, type) {
            const color = type === "danger" ? "text-red-400" : "text-green-400";
            const symbol = type === "danger" ? "-" : "+";
            const html = `<div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center text-xs border border-white/5">
                <span>${label}</span><b class="${color}">${symbol}${val} kWh</b></div>`;
            document.getElementById('historyLog').insertAdjacentHTML('afterbegin', html);
            document.getElementById('mainInput').value = "";
        }

        function updateUI() {
            document.getElementById('balanceVal').innerText = balance.toFixed(1);
        }

        async function saveToCloud() {
            document.getElementById('sync-status').innerText = "SYNCING...";
            const params = new URLSearchParams({
                action: "save",
                meterID: meterID,
                balance: balance,
                used: 0,
                history: document.getElementById('historyLog').innerHTML
            });
            await fetch(SHEET_URL + "?" + params);
            document.getElementById('sync-status').innerText = "SYNCED";
        }

        async function loadFromCloud() {
            document.getElementById('sync-status').innerText = "LOADING...";
            try {
                const r = await fetch(SHEET_URL + "?meterID=" + meterID + "&t=" + Date.now());
                const d = await r.json();
                if(d) {
                    balance = parseFloat(d.balance || 0);
                    document.getElementById('historyLog').innerHTML = d.history || "";
                }
                updateUI();
                document.getElementById('sync-status').innerText = "SYNCED";
            } catch (e) {
                document.getElementById('sync-status').innerText = "OFFLINE";
            }
        }

        // Efek Petir Animasi Background
        const canvas = document.getElementById('lightning');
        const ctx = canvas.getContext('2d');
        function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = init; init();
        function draw() {
            ctx.fillStyle = 'rgba(5, 7, 10, 0.2)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if(Math.random() > 0.96) {
                ctx.strokeStyle = '#00d2ff'; ctx.lineWidth = 1;
                let x = Math.random() * canvas.width, y = 0; ctx.beginPath(); ctx.moveTo(x, y);
                while(y < canvas.height) { x += (Math.random()-0.5)*40; y += 20; ctx.lineTo(x, y); }
                ctx.stroke();
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
